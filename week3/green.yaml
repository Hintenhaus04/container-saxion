apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: app-prod
  labels:
    app: my-app
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
      version: green
  template:
    metadata:
      labels:
        app: my-app
        version: green
    spec:
      containers:
        - name: app
          image: europe-west1-docker.pkg.dev/public-cloud-concept/week3-repo/app-green:latest
          ports:
            - containerPort: 80
